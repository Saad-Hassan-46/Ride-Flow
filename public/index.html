<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideFlow - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="brand-header">
                <h1>Ride<span>Flow</span></h1>
                <p>Intelligent, Real-Time Fleet Matching</p>
            </div>

            <div id="error-alert" class="alert alert-danger"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="rider@rideflow.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn">SIGN IN</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
