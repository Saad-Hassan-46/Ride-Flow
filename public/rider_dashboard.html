<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideFlow - Rider Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Specific Dashboard Layout Adjustments */
        .dashboard-container { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-top: 20px; }
        .card { background-color: var(--bg-secondary); border-radius: 12px; padding: 25px; border: 1px solid var(--border-color); margin-bottom: 20px;}
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border-color); }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        .data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        .data-table th { color: var(--text-muted); text-transform: uppercase; font-size: 0.8rem; }
        .status-badge { background: #333; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.8rem;}
        .status-completed { color: var(--accent-primary); }
        .status-active { color: #00CCFF; border: 1px solid #00CCFF;}
        #estimate-result { display: none; margin: 15px 0; padding: 15px; background: rgba(0, 255, 102, 0.1); border-left: 4px solid var(--accent-primary); }
        .fare-price { font-size: 1.8rem; font-weight: bold; color: var(--accent-primary); }
        
        @media (max-width: 768px) { .dashboard-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="brand-header" style="margin:0; text-align:left;">
                <h1 style="font-size: 1.8rem;">Ride<span>Flow</span></h1>
            </div>
            <div>
                <span id="user-greeting" style="margin-right: 15px; font-weight: bold;"></span>
                <button id="logout-btn" class="btn btn-danger" style="width: auto; padding: 8px 15px;">Logout</button>
            </div>
        </nav>

        <div class="dashboard-container">
            <div>
                <div class="card" id="active-ride-card" style="display: none; border-color: #00CCFF;">
                    <h3 style="color: #00CCFF; margin-bottom: 10px;">🟢 Active Ride Track</h3>
                    <p><strong>Status:</strong> <span id="active-status" class="status-badge status-active"></span></p>
                    <p><strong>Driver:</strong> <span id="active-driver"></span></p>
                    <p><strong>Vehicle:</strong> <span id="active-vehicle"></span></p>
                    <p><strong>Fare:</strong> Rs. <span id="active-fare"></span></p>
                </div>

                <div class="card">
                    <h2 style="margin-bottom: 20px;">Book a Ride</h2>
                    <form id="booking-form">
                        <div class="form-group">
                            <label>Pickup Location</label>
                            <select id="pickup-select" class="form-control" required></select>
                        </div>
                        <div class="form-group">
                            <label>Drop-off Location</label>
                            <select id="dropoff-select" class="form-control" required></select>
                        </div>
                        
                        <div id="estimate-result">
                            <p style="color: var(--text-muted); font-size: 0.9rem;">Estimated Fare</p>
                            <div class="fare-price">Rs. <span id="display-fare">0.00</span></div>
                            <p style="font-size: 0.8rem; margin-top: 5px;" id="display-metrics"></p>
                        </div>

                        <button type="button" id="btn-estimate" class="btn" style="margin-bottom: 10px; background:#444; color:#fff;">Get Estimate</button>
                        <button type="submit" id="btn-book" class="btn" style="display: none;">CONFIRM BOOKING</button>
                    </form>
                </div>
            </div>

            <div>
                <div class="card">
                    <h2 style="margin-bottom: 20px;">Recent Trips</h2>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Route</th>
                                <th>Driver</th>
                                <th>Fare</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="history-table-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/rider.js"></script>
</body>
</html>
